{% extends "base.html" %}

{% block content %}
<section class="panel narrow">
    <div class="panel-header"><h2>{{ 'Create Advertiser' if mode == 'create' else 'Edit Advertiser' }}</h2></div>
    <form method="post" class="form-grid">
        <label><span>Name</span><input type="text" name="name" value="{{ advertiser.name or '' }}" required></label>
        <label><span>Vertical</span><input type="text" name="vertical" value="{{ advertiser.vertical or '' }}" required></label>
        <label>
            <span>Status</span>
            <select name="status">
                <option value="active" {% if advertiser.status == 'active' %}selected{% endif %}>Active</option>
                <option value="paused" {% if advertiser.status == 'paused' %}selected{% endif %}>Paused</option>
            </select>
        </label>
        <div class="form-actions">
            <button class="primary-button" type="submit">Save Advertiser</button>
            <a class="secondary-button" href="{{ url_for('advertisers.index') }}">Cancel</a>
        </div>
    </form>
</section>
{% endblock %}
