{% extends "base.html" %}

{% block content %}
<section class="panel narrow">
    <div class="panel-header"><h2>{{ 'Create Order' if mode == 'create' else 'Edit Order' }}</h2></div>
    <form method="post" class="form-grid">
        <label><span>Order Name</span><input type="text" name="name" value="{{ order.name or '' }}" required></label>
        <label>
            <span>Advertiser</span>
            <select name="advertiser_id" required>
                <option value="">Select advertiser</option>
                {% for advertiser in advertisers %}
                <option value="{{ advertiser.id }}" {% if order.advertiser_id == advertiser.id %}selected{% endif %}>{{ advertiser.name }}</option>
                {% endfor %}
            </select>
        </label>
        <label><span>Start Date</span><input type="date" name="start_date" value="{{ order.start_date }}" required></label>
        <label><span>End Date</span><input type="date" name="end_date" value="{{ order.end_date }}" required></label>
        <label><span>Budget Amount</span><input type="number" step="0.01" name="budget_amount" value="{{ order.budget_amount or 0 }}" required></label>
        <label><span>Spent Amount</span><input type="number" step="0.01" name="spent_amount" value="{{ order.spent_amount or 0 }}"></label>
        <label>
            <span>Status</span>
            <select name="status">
                {% for option in ['active', 'paused', 'completed'] %}
                <option value="{{ option }}" {% if order.status == option %}selected{% endif %}>{{ option.title() }}</option>
                {% endfor %}
            </select>
        </label>
        <label>
            <span>Workflow State</span>
            <select name="workflow_state">
                {% for workflow_state in workflow_states %}
                <option value="{{ workflow_state }}" {% if order.workflow_state == workflow_state %}selected{% endif %}>{{ workflow_state }}</option>
                {% endfor %}
            </select>
        </label>
        <label class="full-span"><span>Notes</span><textarea name="notes" rows="4">{{ order.notes or '' }}</textarea></label>
        <div class="form-actions">
            <button class="primary-button" type="submit">Save Order</button>
            <a class="secondary-button" href="{{ url_for('orders.index') }}">Cancel</a>
        </div>
    </form>
</section>
{% endblock %}
